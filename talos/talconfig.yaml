---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.1.254:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.1.254"
  - "cluster.alextrew.com"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "amusement-machine1"
    ipAddress: "192.168.1.38"
    installDiskSelector:
      serial: "50026B73831CDD8A"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ee827ee541fb06e742e6d183f4e3c1a62a2d63d945cbbd0b1e76da9221af9d27
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "20:7c:14:f4:83:21"
        dhcp: false
        addresses:
          - "192.168.1.38/24"
        routes:
          - gateway: "192.168.1.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.1.254"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

